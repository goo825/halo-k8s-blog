<!doctype html>
<html
  lang="en"
  xmlns:th="https://www.thymeleaf.org"
  th:fragment="html (head,content)"
>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=2"
    />
    <title th:text="${site.title}">Halo K8s 中文主题</title>
    <link
      rel="stylesheet"
      th:href="@{/assets/css/style.css?v={version}(version=${theme.spec.version})}"
    />
    <script
      th:src="@{/assets/js/main.js?v={version}(version=${theme.spec.version})}"
      defer
    ></script>
    <th:block th:if="${head != null}">
      <th:block th:replace="${head}" />
    </th:block>
  </head>
  <body
    th:style="'--accent-color: ' + (${theme.config.appearance.accent_color} ?: '#2563eb')"
  >
    <div class="backdrop"></div>
    <header class="site-shell site-header">
      <div class="brand-row">
        <a class="brand-mark" href="/">
          <span class="brand-dot"></span>
          <span>
            <strong th:text="${site.title}">Halo Blog</strong>
            <small>由 Jenkins 自动发布</small>
          </span>
        </a>
        <nav class="top-nav" aria-label="Primary">
          <a href="/">首页</a>
          <a href="/archives">归档</a>
          <a href="/categories">分类</a>
          <a href="/tags">标签</a>
        </nav>
      </div>
      <div class="hero-card">
        <div class="hero-grid">
          <section class="hero-copy-block">
            <p class="eyebrow">Halo + K8s + Jenkins</p>
            <h1 th:text="${theme.config.appearance.hero_title ?: site.title}">
              基于 Kubernetes 的 Halo 博客系统
            </h1>
            <p
              class="hero-copy"
              th:text="${theme.config.appearance.hero_description ?: site.subtitle}"
            >
              该主题由 Jenkins 自动发布，并通过 Halo 的主题机制加载到博客前台。
            </p>
            <div class="hero-actions">
              <a class="button button-primary" href="/">查看文章</a>
              <a class="button button-secondary" href="/archives">查看归档</a>
            </div>
          </section>
          <aside class="hero-panel">
            <p
              class="status-pill"
              th:text="${theme.config.appearance.status_label ?: 'CI/CD 已上线'}"
            >
              CI/CD 已上线
            </p>
            <ul class="feature-list">
              <li
                th:text="${theme.config.appearance.feature_one ?: 'Kubernetes 容器编排'}"
              >
                Kubernetes 容器编排
              </li>
              <li
                th:text="${theme.config.appearance.feature_two ?: 'Jenkins 自动化发布'}"
              >
                Jenkins 自动化发布
              </li>
              <li
                th:text="${theme.config.appearance.feature_three ?: 'Halo 内容管理'}"
              >
                Halo 内容管理
              </li>
            </ul>
            <p class="hero-meta">
              当前主题：
              <strong th:text="${theme.spec.displayName}">Halo K8s 中文主题</strong>
            </p>
          </aside>
        </div>
      </div>
    </header>
    <main class="site-shell site-main">
      <th:block th:replace="${content}" />
    </main>
    <footer class="site-shell site-footer">
      <p>
        <span th:text="${site.title}">Halo 博客</span>
        <span class="footer-sep">/</span>
        基于 GitHub、Jenkins 与 Kubernetes 自动交付
      </p>
      <p id="build-year">主题包已启用</p>
    </footer>
  </body>
</html>
