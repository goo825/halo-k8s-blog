<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{layout :: html(head = null,content = ~{::content})}"
>
  <th:block th:fragment="content">
    <article class="content-card prose article-shell">
      <a class="back-link" href="/">返回首页</a>
      <p class="eyebrow">页面</p>
      <h1 th:text="${singlePage.spec.title}">页面标题</h1>
      <div class="article-body" th:utext="${singlePage.content.content}"></div>
    </article>
  </th:block>
</html>
