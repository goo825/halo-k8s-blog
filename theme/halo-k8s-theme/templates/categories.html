<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{layout :: html(head = null,content = ~{::content})}"
>
  <th:block th:fragment="content">
    <section class="content-card">
      <p class="eyebrow">Taxonomy</p>
      <h1>Categories</h1>
      <ul class="post-list">
        <li th:each="category : ${categories.items}" th:text="${category.spec.displayName}">
          Category
        </li>
      </ul>
    </section>
  </th:block>
</html>
