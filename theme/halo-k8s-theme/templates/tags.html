<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{layout :: html(head = null,content = ~{::content})}"
>
  <th:block th:fragment="content">
    <section class="content-card">
      <p class="eyebrow">标签</p>
      <h1>全部标签</h1>
      <ul class="post-list">
        <li th:each="tag : ${tags.items}" th:text="${tag.spec.displayName}">
          标签
        </li>
      </ul>
    </section>
  </th:block>
</html>
