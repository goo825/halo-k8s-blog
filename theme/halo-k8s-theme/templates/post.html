<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{layout :: html(head = null,content = ~{::content})}"
>
  <th:block th:fragment="content">
    <article class="content-card prose article-shell">
      <a class="back-link" href="/">Back to home</a>
      <p class="eyebrow">Post</p>
      <h1 th:text="${post.spec.title}">Post title</h1>
      <div class="article-body" th:utext="${post.content.content}"></div>
    </article>
  </th:block>
</html>
