<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{layout :: html(head = null,content = ~{::content})}"
>
  <th:block th:fragment="content">
    <section class="content-card section-heading">
      <div>
        <p class="eyebrow">最新发布</p>
        <h2>最近文章</h2>
      </div>
      <p class="section-copy">
        下方内容由 Halo 动态渲染，并由仓库中维护的主题资源包统一控制前台样式。
      </p>
    </section>

    <section class="post-grid">
      <article class="post-card" th:each="post : ${posts.items}">
        <p class="card-kicker">文章</p>
        <h3>
          <a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}">
            示例文章
          </a>
        </h3>
        <p class="card-copy">
          打开文章即可查看由当前主题渲染的完整内容页面。
        </p>
        <a class="text-link" th:href="@{${post.status.permalink}}">阅读文章</a>
      </article>
    </section>

    <section class="content-card empty-state" th:if="${#lists.isEmpty(posts.items)}">
      <h3>暂时还没有文章</h3>
      <p>
        当你在 Halo 中发布第一篇文章后，它会自动显示在这里。
      </p>
    </section>

    <div class="pager content-card">
      <a class="button button-secondary" th:if="${posts.hasPrevious()}" th:href="@{${posts.prevUrl}}">
        上一页
      </a>
      <a class="button button-primary" th:if="${posts.hasNext()}" th:href="@{${posts.nextUrl}}">
        下一页
      </a>
    </div>
  </th:block>
</html>
