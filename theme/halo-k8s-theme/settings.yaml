apiVersion: v1alpha1
kind: Setting
metadata:
  name: halo-k8s-theme-setting
spec:
  forms:
    - group: appearance
      label: 外观
      formSchema:
        - $formkit: color
          name: accent_color
          label: 主题色
          value: "#2563eb"
        - $formkit: text
          name: hero_title
          label: 首页主标题
          value: "基于 Kubernetes 的 Halo 博客系统"
        - $formkit: textarea
          name: hero_description
          label: 首页说明
          value: "该主题由 Jenkins 自动发布，并通过 Halo 的主题机制加载到博客前台。"
        - $formkit: text
          name: status_label
          label: 状态标签
          value: "CI/CD 已上线"
        - $formkit: text
          name: feature_one
          label: 特性一
          value: "Kubernetes 容器编排"
        - $formkit: text
          name: feature_two
          label: 特性二
          value: "Jenkins 自动化发布"
        - $formkit: text
          name: feature_three
          label: 特性三
          value: "Halo 内容管理"
