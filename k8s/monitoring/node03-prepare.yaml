apiVersion: batch/v1
kind: Job
metadata:
  name: monitoring-node03-prepare
  namespace: monitoring-system
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        job: monitoring-node03-prepare
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: k8s-master-03
      tolerations:
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: prepare
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /host-data/prometheus /host-data/grafana
              chmod 777 /host-data/prometheus /host-data/grafana
          volumeMounts:
            - name: host-data
              mountPath: /host-data
      volumes:
        - name: host-data
          hostPath:
            path: /data
            type: DirectoryOrCreate
